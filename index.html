<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tempahan Projektor PJ01</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 5px; }
        .unit-tag { background: #e8f0fe; color: #1a73e8; text-align: center; font-weight: bold; padding: 8px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #1a73e8; }
        
        .alert { padding: 12px; border-radius: 8px; font-size: 14px; margin-top: 15px; display: none; font-weight: bold; text-align: center; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        button { width: 100%; background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .record-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tempahan Projektor Online</h2>
    <div class="unit-tag">UNIT: PJ01 (SK KRANGAN)</div>

    <label>Nama Guru & Kelas:</label>
    <input type="text" id="namaGuru" placeholder="Contoh: Cikgu Sarah (5 Bijak)">

    <label>Tarikh Penggunaan:</label>
    <input type="date" id="tarikh" onchange="semakPertindihan()">

    <label>Pilih Slot Masa:</label>
    <select id="slotMasa" onchange="semakPertindihan()">
        <option value="">-- Pilih Slot --</option>
        <option value="Slot 1 (07:30-08:00)">Slot 1 (07:30-08:00)</option>
        <option value="Slot 2 (08:00-08:30)">Slot 2 (08:00-08:30)</option>
        <option value="Slot 3 (08:30-09:00)">Slot 3 (08:30-09:00)</option>
        <option value="Slot 4 (09:00-09:30)">Slot 4 (09:00-09:30)</option>
        <option value="Slot 5 (09:30-10:00)">Slot 5 (09:30-10:00)</option>
        <option value="Slot 6 (10:30-11:00)">Slot 6 (10:30-11:00)</option>
        <option value="Slot 7 (11:00-11:30)">Slot 7 (11:00-11:30)</option>
        <option value="Slot 8 (11:30-12:00)">Slot 8 (11:30-12:00)</option>
        <option value="Slot 9 (12:00-12:30)">Slot 9 (12:00-12:30)</option>
        <option value="Slot 10 (12:30-01:00)">Slot 10 (12:30-01:00)</option>
    </select>

    <div id="statusMesej" class="alert"></div>

    <button id="btnHantar" onclick="hantarTempahan()">Hantar Tempahan</button>

    <div class="record-section">
        <h3 style="text-align:center">Semakan Jadual Terkini</h3>
        <table id="jadualRekod">
            <thead>
                <tr>
                    <th>Tarikh</th>
                    <th>Slot</th>
                    <th>Nama Guru</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // URL API BARU ANDA
    const urlAPI = "https://script.google.com/macros/s/AKfycbz3532OY41iClNbHAKg3rsiZofmEN5Qxf8JKltRSsfhGNNs_vOZBsEl922y_DWYSVtU3A/exec";
    
    let rekodData = [];

    // Muat data semasa mula
    async function muatData() {
        try {
            const res = await fetch(urlAPI);
            rekodData = await res.json();
            paparJadual();
        } catch (e) { console.error("Gagal muat data."); }
    }

    function paparJadual() {
        const tbody = document.querySelector("#jadualRekod tbody");
        tbody.innerHTML = "";
        rekodData.slice().reverse().forEach(r => {
            const row = tbody.insertRow();
            row.innerHTML = `<td>${r.tarikh}</td><td>${r.slot}</td><td>${r.nama}</td>`;
        });
    }

    // FUNGSI SEKAT DOUBLE BOOKING
    function semakPertindihan() {
        const t = document.getElementById('tarikh').value;
        const s = document.getElementById('slotMasa').value;
        const msg = document.getElementById('statusMesej');
        const btn = document.getElementById('btnHantar');

        if (!t || !s) return;

        // Semak jika Tarikh + Slot sudah ada dalam Sheets
        const sudahAda = rekodData.some(r => r.tarikh === t && r.slot === s);

        msg.style.display = "block";
        if (sudahAda) {
            msg.className = "alert alert-danger";
            msg.innerText = "🚨 SLOT BERTINDIH! Sila pilih slot atau tarikh lain.";
            btn.disabled = true;
        } else {
            msg.className = "alert alert-success";
            msg.innerText = "✅ SLOT KOSONG. Anda boleh menempah.";
            btn.disabled = false;
        }
    }

    async function hantarTempahan() {
        const nama = document.getElementById('namaGuru').value;
        const tarikh = document.getElementById('tarikh').value;
        const slot = document.getElementById('slotMasa').value;
        const btn = document.getElementById('btnHantar');

        if (!nama || !tarikh || !slot) return alert("Lengkapkan maklumat!");

        btn.disabled = true;
        btn.innerText = "Memproses...";

        try {
            await fetch(urlAPI, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ nama, tarikh, slot })
            });
            alert("Tempahan Berjaya!");
            location.reload();
        } catch (e) {
            alert("Ralat. Cuba lagi.");
            btn.disabled = false;
        }
    }

    window.onload = muatData;
</script>
</body>
</html>
