      /* A4 Preview & PDF specific sizing */
      .pdf-page {
        width: 210mm;
        height: 297mm;
        padding: 15mm;

      }
      /* Custom utility for forced high quality */
      .force-print-visible {
        -webkit-print-color-adjust: exact !important;

      }
